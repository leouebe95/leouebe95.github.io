<!DOCTYPE html>
<html lang="en">
  <head>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=M+PLUS+2:wght@100..900&display=swap" rel="stylesheet">

	<link rel="stylesheet" href="./counters.css">

	<script src="./src/counterData.js"></script>
	<script src="./src/counterDB.js"></script>
	<script src="./src/counterCard.js"></script>
	<script src="./src/counters.js"></script>

	<title>Counter suffixes</title>
  </head>

  <body id="body">
	<div id="UI" class="header noprint">
	  <span class="left">
		<label for="modeSelect"><strong>Display Mode: </strong></label>
		<select id="modeSelect">
		  <option value="KANA">Hiragana</option>
		  <option value="ROMA">Romaji</option>
		  <option value="BOTH">Both</option>
		</select>

		<span style="width: 1cm; display: inline-flex; "></span>

		<label for="dirSelect"><strong>Layout: </strong></label>
		<select id="dirSelect">
		  <option value="VERT">Vertical</option>
		  <option value="HORIZ">Horizontal</option>
		  <option value="HORIZ_2PAGES">Two Horizontal pages</option>
		</select>
	  </span>
	  <span class="right">Designed to be printed as <span id="layoutId">one portrait A3 page</span>.</span>
	</div>
	<div id="mainId"></div>
  </body>
</html>
