<!DOCTYPE html>
<html>
  <head>
	<meta charset="UTF-8" />
	<title>Japanese Slides</title>
	<link id="favicon" rel="icon" href="nihongo.png" type="image/x-icon">

	<link type="text/css" rel="stylesheet" href="styles/nihongo.css" />
	<link type="text/css" rel="stylesheet" href="styles/slides.css" />

	<script type="text/javascript" src="scripts/romaji.js"></script>
	<script type="text/javascript" src="scripts/dbManager.js"></script>
	<script type="text/javascript" src="scripts/nihongoDB.js"></script>
	<script type="text/javascript" src="scripts/slideDB.js"></script>
	<script type="text/javascript" src="scripts/nihongoSlides.js"></script>

	<!-- Include the PptxGenJS script (export to pptx slides) -->
	<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
	<!-- <script async src="https://jsdelivr.net" onload="PptxGenJSLoaded()"></script> -->
	<!-- <script async src="https://unpkg.com/pptxgenjs@4.0.1/dist/pptxgen.bundle.js" onload="PptxGenJSLoaded()"></script>-->
	<script type="text/javascript" src="scripts/pptxgen.bundle.js"></script>
	
	<script type="text/javascript" src="scripts/pptxExporter.js"></script>

	<!-- For iOS  -->
	<meta name="viewport" content="user-scalable=no, width=device-width,
								   initial-scale=1.0, maximum-scale=1.0" />
	<meta name="mobile-web-app-capable" content="yes">

	<meta name="apple-mobile-web-app-status-bar-style" content="black" />
	<link rel="apple-touch-icon" href="img/place.jpg" />

  </head>

  <body>
	<div id="UI" class="noprint">
      <div id="slide-index" class="slide-index"></div>
      <div class="slide-controls">
		<button class="large" id="prev-slide">
          <img src="img/prev.png" title="Previous Slide" />Prev
		</button>
		<button class="large" id="next-slide">
          <img src="img/next.png" title="Next Slide" />Next
		</button>

		<label for="slide-selector">Go to Slide:</label>
		<select id="slide-selector">
          <option value="">-- Select a slide --</option>
		</select>

		<label>
          <input type="checkbox" id="show-romaji-toggle" checked>
          Show Romaji
		</label>
		<!-- disable the button until jsdelivr.net loads -->
		<button class="large" id="export-pptx">
          <img src="img/export.png" title="To pptx" /><div>To pptx</div>
		</button>
      </div>
	</div>
	<div id="messageBox" class="noprint"></div>

	<div id="slides-container">
      <table id="slide-table">
		<!-- Populated dynamically -->
      </table>
	</div>

	<!-- PPTX Export Modal -->
	<div id="export-modal" class="modal hidden noprint">
      <div class="modal-content">
        <div class="modal-header">
          <h2>Export to PPTX</h2>
          <span class="close-modal" id="modal-close-btn">&times;</span>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <label for="export-filename"><strong>File Name:</strong></label>
            <input type="text" id="export-filename" value="Nihongo_Vocabulary.pptx" placeholder="Presentation.pptx" />
          </div>

          <div class="form-group">
            <label for="export-pages-select"><strong>Slides:</strong></label>
            <select id="export-pages-select">
              <option value="all">All slides</option>
              <option value="custom">Custom range</option>
            </select>
            <div id="custom-pages-container" class="hidden">
              <input type="text" id="custom-pages-input" placeholder="e.g. 1-5,7,9" />
              <div class="help-text">Enter slide indices separated by commas, or ranges (e.g., 1-5).</div>
              <div id="custom-pages-error" class="error-text hidden"></div>
            </div>
          </div>

          <div class="form-group">
            <label for="export-ratio"><strong>Slide Aspect Ratio:</strong></label>
            <select id="export-ratio">
              <option value="16/9">16:9 (Widescreen)</option>
              <option value="4/3">4:3 (Standard)</option>
            </select>
          </div>
        </div>
        <div class="modal-footer">
          <button id="modal-cancel-btn" class="secondary">Cancel</button>
          <button id="modal-confirm-btn" class="primary">Export</button>
        </div>
      </div>
	</div>
  </body>

</html>
